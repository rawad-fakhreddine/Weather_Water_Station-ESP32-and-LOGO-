[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
board_build.flash_mode = dio

lib_ignore = WiFiNINA_-_Adafruit_Fork

; Local library path — update this to your PlatformIO libs folder.
; Required libs: Adafruit_MQTT_Library, DHT sensor library, Adafruit_Sensor
lib_extra_dirs = C:\PIO_Libs

monitor_dtr = 0
monitor_rts = 0